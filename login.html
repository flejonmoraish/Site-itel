<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilo.css">
    <title>Login do aluno</title>
    <style>
        div{
            border: 2px solid ;

            background-color: blue;
            box-shadow: 10px 10px 10px;

        }
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: rgb(44, 44, 180);
        }
    </style>
</head>
<body>
    <form>
    <div>
        <h1 style="padding-left: 70px;padding-top: 20px; ">LOGIN</h1><br><br>

        <label for="Número de processo">Processo</label>
        <input type="text" id="Número de processo" name="Número de processo" placeholder="Número de processo" required><br>
        <label for="Codigo">Codigo</label><br>
        <input type="tel" id="Codigo" name="Codigo" placeholder="Codigo" required>
        <br><br>


        <button type="submit">Enviar</button>
    </div>
</form>     
</body>
